# DEPRECATED (Faz 7.1): merged into docker/docker-compose.prod.yml — do not use for routine deploy.
# Kept temporarily for reference during the legacy postgres rollback window (~7 days after cutover).
# Historical one-shot cutover: scripts/cutover-prod-supabase.sh
#
#   docker compose --project-name pastane-prod --env-file .env.production \
#     -f docker/docker-compose.prod.yml \
#     -f docker/docker-compose.prod.cutover.yml \
#     up -d
name: pastane-prod

networks:
  pastane_supabase:
    external: true
    name: pastane_supabase

services:
  postgres:
    profiles: ["legacy-db"]

  api:
    networks:
      - pastane_internal
      - pastane_edge
      - pastane_supabase
    depends_on: !reset
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

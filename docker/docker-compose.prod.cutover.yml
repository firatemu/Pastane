# Faz 7 cutover overlay — use ONLY on maintenance day with supabase-prod stack running.
# Production file docker-compose.prod.yml stays unchanged until this merge is applied.
#
#   docker compose --project-name pastane-prod --env-file .env.production \
#     -f docker/docker-compose.prod.yml \
#     -f docker/docker-compose.prod.cutover.yml \
#     up -d
#
# Effects: legacy postgres → profile; API joins pastane_supabase network; no postgres depends_on.
name: pastane-prod

networks:
  pastane_supabase:
    external: true
    name: pastane_supabase

services:
  postgres:
    profiles: ["legacy-db"]

  api:
    networks:
      - pastane_internal
      - pastane_edge
      - pastane_supabase
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

# Pastane production Supabase — official self-hosted stack (Faz 8.0).
#
# Usage (from repo root):
#   bash scripts/lib/compose-prod.sh   # via ensure_supabase_stack_up
#   docker compose --project-name supabase-prod \
#     --env-file <generated-supabase-env> \
#     -f docker/supabase/docker-compose.yml \
#     -f docker/supabase/docker-compose.pg17.yml \
#     -f docker/supabase/docker-compose.pastane.prod.yml up -d
#
# Env: scripts/generate-supabase-compose-env.sh builds a runtime file from .env.production
# (maps SUPABASE_JWT_SECRET → JWT_SECRET for the stack without touching Pastane JWT_SECRET).

include:
  - path: supabase/docker-compose.yml
  - path: supabase/docker-compose.pg17.yml
  - path: supabase/docker-compose.pastane.prod.yml

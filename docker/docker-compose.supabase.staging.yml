# Staging Supabase — full official self-hosted stack (Faz 8.0 dry-run).
# Does NOT touch pastane-prod.
#
# Usage (VPS):
#   bash scripts/generate-supabase-compose-env.sh .env.staging docker/supabase/.runtime.staging.env
#   docker compose --project-name supabase-staging \
#     --env-file docker/supabase/.runtime.staging.env \
#     -f docker/supabase/docker-compose.yml \
#     -f docker/supabase/docker-compose.pg17.yml \
#     -f docker/supabase/docker-compose.pastane.staging.yml up -d
#
# Studio: 127.0.0.1:55323 | DB host tools: 127.0.0.1:55432

include:
  - path: supabase/docker-compose.yml
  - path: supabase/docker-compose.pg17.yml
  - path: supabase/docker-compose.pastane.staging.yml

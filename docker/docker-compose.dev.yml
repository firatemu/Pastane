name: pastane-dev
# App services mount host source + use polling so Next/Nest pick up edits without rebuilding images.
# After dependency or root workspace file changes, rebuild: docker compose ... build api (etc.).
#
# Database: default local dev uses Supabase CLI (`pnpm supabase:start`). Legacy Postgres container is
# opt-in via profile `legacy-db` (rollback: `docker compose --profile legacy-db up -d postgres`).
services:
  postgres:
    profiles: ["legacy-db"]
    image: postgres:16-alpine
    container_name: pastane_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: pastane_redis_dev
    restart: unless-stopped
    # Default avoids `requirepass` with no value when Compose runs without a populated `.env`.
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    ports: ["6379:6379"]
    volumes: ["redis_dev_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: pastane_minio_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_dev_data:/data"]
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.dev
    container_name: pastane_api_dev
    restart: unless-stopped
    env_file: ["../.env"]
    # Eski `pastane_api_prod` `:3003`'ü tutuyorsa dev API map edilemez — `bash scripts/docker-stop-local-prod.sh`
    # çalıştırın ya da kök `.env` içinde `HOST_DEV_API_PORT` (örn. `30033`) kullanın — içerde yine `:3003`.
    ports:
      - "${HOST_DEV_API_PORT:-3003}:3003"
    volumes:
      # Prisma + API kaynak: host değişiklikleri `nest start --watch` ile yenilenir (imaj yeniden build gerekmez).
      - ../packages/database:/app/packages/database
      - ../apps/api/src:/app/apps/api/src
    environment:
      PUBLIC_API_URL: http://localhost:${HOST_DEV_API_PORT:-3003}
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      DIRECT_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
  web:
    env_file: ["../.env"]
    environment:
      WEB_API_URL: http://api:3003
      RUNNING_IN_DOCKER: "1"
      NEXT_DIST_DIR: .next-docker
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.dev
    container_name: pastane_web_dev
    restart: unless-stopped
    ports: ["3000:3000"]
    volumes:
      # Çalışma anında görünür `node_modules` tamamen HOST kök dizininden gelir. `pnpm install` / hoist
      # düzeni veya `.npmrc` değiştiğinde `apps/*/node_modules`'u ve `.next-docker` önbelleğini temizleyin
      # (`pnpm fix:frontend-cache`). Aksi halde eski webpack çıktısı silinmiş `.pnpm/next@.../...`
      # yollarına `ENOENT` ile düşebilir.
      - ../node_modules:/app/node_modules
      - ../packages/ui:/app/packages/ui
      - ../packages/tr-api-errors:/app/packages/tr-api-errors
      - ../apps/web:/app/apps/web
      - ../tsconfig.base.json:/app/tsconfig.base.json:ro
    depends_on: ["api"]
  admin:
    env_file: ["../.env"]
    environment:
      ADMIN_API_URL: http://api:3003
      RUNNING_IN_DOCKER: "1"
      # Host `next build` uses default `.next`; dev container must not share that folder.
      NEXT_DIST_DIR: .next-docker
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile.dev
    container_name: pastane_admin_dev
    restart: unless-stopped
    ports: ["3001:3001"]
    volumes:
      # `node_modules` ve `.next-docker` önbelleği: üstte `web` servisindeki notlara bakın (`pnpm fix:frontend-cache`).
      - ../node_modules:/app/node_modules
      - ../packages/ui:/app/packages/ui
      - ../packages/tr-api-errors:/app/packages/tr-api-errors
      - ../apps/admin:/app/apps/admin
      - ../tsconfig.base.json:/app/tsconfig.base.json:ro
    depends_on: ["api"]
  courier:
    env_file: ["../.env"]
    environment:
      COURIER_API_URL: http://api:3003
      RUNNING_IN_DOCKER: "1"
      NEXT_DIST_DIR: .next-docker
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    build:
      context: ..
      dockerfile: apps/courier/Dockerfile.dev
    container_name: pastane_courier_dev
    restart: unless-stopped
    ports: ["3002:3002"]
    volumes:
      # `node_modules` ve `.next-docker` önbelleği: üstte `web` servisindeki notlara bakın (`pnpm fix:frontend-cache`).
      - ../node_modules:/app/node_modules
      - ../packages/ui:/app/packages/ui
      - ../packages/tr-api-errors:/app/packages/tr-api-errors
      - ../apps/courier:/app/apps/courier
      - ../tsconfig.base.json:/app/tsconfig.base.json:ro
    depends_on: ["api"]
volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:

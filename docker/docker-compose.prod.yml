name: pastane-prod

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  pastane_internal:
    internal: true
  pastane_edge: {}
  pastane_supabase:
    external: true
    name: pastane_supabase

services:
  postgres:
    profiles: ["legacy-db"]
    image: postgres:16-alpine
    container_name: pastane_postgres_prod
    restart: unless-stopped
    logging: *json-logging
    networks:
      - pastane_internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pastane_redis_prod
    restart: unless-stopped
    logging: *json-logging
    networks:
      - pastane_internal
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pastane_minio_prod
    restart: unless-stopped
    logging: *json-logging
    networks:
      - pastane_internal
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    expose:
      - "9000"
      - "9001"
    ports:
      # Bound to loopback only — Host Nginx proxies https://storage.azem.cloud to MinIO API.
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.prod
      args:
        VERSION: ${IMAGE_TAG:-v0.0.0-placeholder}
    image: ${REGISTRY:-pastane}/pastane-api:${IMAGE_TAG:-v0.0.0-placeholder}
    container_name: pastane_api_prod
    restart: unless-stopped
    logging: *json-logging
    env_file:
      - ../.env.production
    networks:
      - pastane_internal
      - pastane_edge
      - pastane_supabase
    expose:
      - "3003"
    ports:
      - "127.0.0.1:3003:3003"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.API_PORT||3003)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web.prod
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        VERSION: ${IMAGE_TAG:-v0.0.0-placeholder}
    image: ${REGISTRY:-pastane}/pastane-web:${IMAGE_TAG:-v0.0.0-placeholder}
    container_name: pastane_web_prod
    restart: unless-stopped
    logging: *json-logging
    env_file:
      - ../.env.production
    networks:
      - pastane_edge
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${WEB_PROD_HOST_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin.prod
      args:
        NEXT_PUBLIC_SITE_URL: ${ADMIN_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        VERSION: ${IMAGE_TAG:-v0.0.0-placeholder}
    image: ${REGISTRY:-pastane}/pastane-admin:${IMAGE_TAG:-v0.0.0-placeholder}
    container_name: pastane_admin_prod
    restart: unless-stopped
    logging: *json-logging
    env_file:
      - ../.env.production
    networks:
      - pastane_edge
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      api:
        condition: service_healthy

  courier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.courier.prod
      args:
        NEXT_PUBLIC_SITE_URL: ${COURIER_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        VERSION: ${IMAGE_TAG:-v0.0.0-placeholder}
    image: ${REGISTRY:-pastane}/pastane-courier:${IMAGE_TAG:-v0.0.0-placeholder}
    container_name: pastane_courier_prod
    restart: unless-stopped
    logging: *json-logging
    env_file:
      - ../.env.production
    networks:
      - pastane_edge
    expose:
      - "3002"
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      api:
        condition: service_healthy

  # Ingress is Host Nginx (80/443) on the VPS — see deploy/nginx/pastane-app.

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:

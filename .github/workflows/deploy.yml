name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deploy secrets
        env:
          GITHUB_REPO: ${{ github.repository }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eo pipefail
          missing=()
          [[ -z "${VPS_HOST// }" ]] && missing+=(VPS_HOST)
          [[ -z "${VPS_USER// }" ]] && missing+=(VPS_USER)
          [[ -z "${VPS_SSH_KEY// }" ]] && missing+=(VPS_SSH_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::notice::Open: https://github.com/${GITHUB_REPO}/settings/secrets/actions"
            echo "::error::Missing Actions secrets: ${missing[*]} (exact names VPS_HOST VPS_USER VPS_SSH_KEY)."
            printf '%s\n' "Create each via New repository secret. VPS_SSH_KEY = full private key PEM for deploy@VPS_HOST."
            printf '%s\n' "Optional: VPS_PORT (else 22). Forks need their own secrets. See docs/GITHUB_CI_SSH.md"
            exit 1
          fi

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/pastane_deploy_key
          chmod 600 ~/.ssh/pastane_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run deploy script on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          ssh -i ~/.ssh/pastane_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            'cd /var/www/pastane-app/app && ./deploy.sh'

name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Credentials: secrets.VPS_* then vars.VPS_* (repo-level). If VPS_* live only under
# Deployments → Environment, this job must declare that environment (default: production).
# Override name: Repository variable PASTANE_GITHUB_ENVIRONMENT

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ vars.PASTANE_GITHUB_ENVIRONMENT || 'production' }}
    steps:
      - name: Verify deploy secrets
        env:
          GITHUB_REPO: ${{ github.repository }}
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || vars.VPS_SSH_KEY }}
        run: |
          set -eo pipefail
          missing=()
          [[ -z "${VPS_HOST// }" ]] && missing+=(VPS_HOST)
          [[ -z "${VPS_USER// }" ]] && missing+=(VPS_USER)
          [[ -z "${VPS_SSH_KEY// }" ]] && missing+=(VPS_SSH_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::notice::Secrets: https://github.com/${GITHUB_REPO}/settings/secrets/actions"
            echo "::notice::Variables: https://github.com/${GITHUB_REPO}/settings/variables/actions"
            echo "::error::Missing VPS_* config: ${missing[*]}"
            printf '%s\n' "Add Repository OR Environment Secrets/Variables named exactly VPS_HOST VPS_USER VPS_SSH_KEY."
            printf '%s\n' "This job uses GitHub Environment: ${{ vars.PASTANE_GITHUB_ENVIRONMENT || 'production' }} — put VPS_* there, or use repo-level Secrets tab."
            printf '%s\n' "Override env name: Repository variable PASTANE_GITHUB_ENVIRONMENT. VPS_SSH_KEY must be Secret. Optional VPS_PORT (default 22)."
            printf '%s\n' "Docs: docs/GITHUB_CI_SSH.md"
            exit 1
          fi

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || vars.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/pastane_deploy_key
          chmod 600 ~/.ssh/pastane_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run deploy script on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"
          ssh -i ~/.ssh/pastane_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            'cd /var/www/pastane-app/app && ./deploy.sh'

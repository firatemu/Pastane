# Supabase Studio (official) — https://studio.azem.cloud → 127.0.0.1:54323 (container :3000)
# Public access: protected by pgAdmin login only (no nginx geo whitelist).
# TLS: expand azem.cloud cert to include studio.azem.cloud (see scripts/setup-studio-vps.sh).

server {
  listen 443 ssl http2;
  server_name studio.azem.cloud;
  ssl_certificate /etc/letsencrypt/live/studio.azem.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/studio.azem.cloud/privkey.pem;
  client_max_body_size 30m;

  location / {
    proxy_pass http://127.0.0.1:54323;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}
